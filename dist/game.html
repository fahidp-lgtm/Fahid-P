    <title>Shadow Fight - QA Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: #0a0508;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #root {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .game-ui { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 10; 
        }
        
        .back-btn { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            pointer-events: auto; 
            padding: 10px 20px; 
            background: rgba(15,23,42,0.8); 
            border: 1px solid #1e293b; 
            color: white; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
            z-index: 100;
            touch-action: manipulation;
        }
        
        .back-btn:hover, .back-btn:active { 
            background: #6366f1; 
        }
        
        .instructions { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(15,23,42,0.8); 
            border: 1px solid #6366f1; 
            padding: 12px 24px; 
            border-radius: 8px; 
            color: white; 
            font-family: monospace; 
            font-size: 12px;
            white-space: nowrap;
            z-index: 100;
        }
    </style>
